# Postgres для хранения признаков, прогнозов и журнала доступа.
# Для разработки/демо можно не поднимать его вовсе: без DATABASE_URL бэкенд
# использует локальный SQLite. Этот compose нужен для прод-подобного запуска.
services:
  postgres:
    image: postgres:16
    container_name: risk_group_pg
    environment:
      POSTGRES_USER: risk
      POSTGRES_PASSWORD: risk
      POSTGRES_DB: risk_group
    ports:
      - "5432:5432"
    volumes:
      - risk_pg_data:/var/lib/postgresql/data
      # Миграции применяются автоматически при первом старте контейнера.
      - ./backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U risk -d risk_group"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  risk_pg_data:
